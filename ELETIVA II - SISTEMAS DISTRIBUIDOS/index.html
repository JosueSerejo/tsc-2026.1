<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atividade Sincronização</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <h1>Atividade</h1>

    <div class="container">
        <!-- Painel de Criação -->
        <div class="panel">
            <h3>Criar Servidor</h3>
            <button onclick="document.getElementById('srv-status').innerText = 'Servidor Ativo'">Criar</button>
            <p id="srv-status">Inativo</p>

            <hr>
            <h3>Criar cliente</h3>
            <div id="lista-clientes">
                <!-- Inputs para 3 clientes conforme a imagem -->
                <div class="cliente-input">
                    <strong>Cliente 1</strong><br>
                    Hora local: <input type="text" id="c1-local" value="10:00:00" placeholder="HH:MM:SS"><br>
                    Hora envio: <input type="text" id="c1-envio" value="10:05:00" placeholder="HH:MM:SS">
                </div>
                <div class="cliente-input">
                    <strong>Cliente 2</strong><br>
                    Hora local: <input type="text" id="c2-local" value="10:10:00" placeholder="HH:MM:SS"><br>
                    Hora envio: <input type="text" id="c2-envio" value="10:02:00" placeholder="HH:MM:SS">
                </div>
                <div class="cliente-input">
                    <strong>Cliente 3</strong><br>
                    Hora local: <input type="text" id="c3-local" value="09:55:00" placeholder="HH:MM:SS"><br>
                    Hora envio: <input type="text" id="c3-envio" value="10:08:00" placeholder="HH:MM:SS">
                </div>
            </div>
        </div>

        <!-- Painel do Servidor -->
        <div class="server-panel panel">
            <h3>Servidor</h3>
            <p>Hora local: <span id="srv-hora" class="red">--:--:--</span></p>
            <button onclick="sincronizar()">Sincronizar</button>

            <div id="resultados" style="margin-top: 20px; display: none;">
                <div class="result-item">Hora Local Cliente 1: <span id="r-c1" class="red"></span></div>
                <div class="result-item">Hora Local Cliente 2: <span id="r-c2" class="red"></span></div>
                <div class="result-item">Hora Local Cliente 3: <span id="r-c3" class="red"></span></div>
                <br>
                <div class="result-item">Clock Lógico: <span id="r-logico" class="red"></span></div>
                <br>
                <div id="ajustes-container"></div>
                <br>
                <strong>Ordem de envio:</strong>
                <div id="ordem-lista"></div>
            </div>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
